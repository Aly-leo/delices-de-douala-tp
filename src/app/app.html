<div class="page">
  <div class="background" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="shell">
    <app-header
      [nom]="restaurantNom"
      [ratedCount]="ratedCount()"
      [totalCount]="totalCount()"
      [averageRating]="averageRating()"
    />

    <nav class="tabs" aria-label="Navigation principale">
      <button
        type="button"
        class="tab"
        [class.active]="activeTab() === 'restaurants'"
        [attr.aria-pressed]="activeTab() === 'restaurants'"
        (click)="selectTab('restaurants')"
      >
        Nos restaurants
      </button>
      <button
        type="button"
        class="tab"
        [class.active]="activeTab() === 'carte'"
        [attr.aria-pressed]="activeTab() === 'carte'"
        (click)="selectTab('carte')"
      >
        La Carte
      </button>
    </nav>

    @if (activeTab() === 'restaurants') {
      <section class="toolbar" aria-label="Affichage des restaurants">
        <button
          type="button"
          class="toggle"
          [class.active]="sortByRating()"
          [attr.aria-pressed]="sortByRating()"
          (click)="toggleSort()"
        >
          <span class="toggle-dot"></span>
          Trier par note
        </button>

        <button
          type="button"
          class="toggle"
          [class.active]="onlyTopRated()"
          [attr.aria-pressed]="onlyTopRated()"
          (click)="toggleFilter()"
        >
          <span class="toggle-dot"></span>
          Top notés (≥ 4&nbsp;★)
        </button>

        @if (onlyTopRated() && visibleRestaurants().length === 0) {
          <span class="toolbar-hint">Aucun restaurant n'atteint encore 4 étoiles.</span>
        }
      </section>

      <app-restaurant-list
        [restaurants]="visibleRestaurants()"
        (restaurantRated)="onRestaurantRated($event)"
      />
    } @else {
      <app-carte />
    }

    <footer class="page-footer">
      <p>© 2026 — Délices de Douala • un guide culinaire camerounais</p>
    </footer>
  </main>
</div>
